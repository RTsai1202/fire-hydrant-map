<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 56">
  <defs>
    <!-- 桶身漸層：右側稍暗，左側稍亮 -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="35%" stop-color="#e74c3c"/>
      <stop offset="65%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <!-- 頂蓋漸層 -->
    <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <!-- 底座漸層 -->
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
  </defs>

  <!-- ===== 底座（梯形） ===== -->
  <path d="M8,49 L32,49 L29,41 L11,41 Z"
        fill="url(#baseGrad)"
        stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- 底座底邊圓角矩形 -->
  <rect x="6" y="49" width="28" height="5" rx="2"
        fill="url(#baseGrad)"
        stroke="white" stroke-width="1.5"/>

  <!-- ===== 桶身（梯形圓柱，上窄下寬） ===== -->
  <path d="M11,17 L29,17 L29,41 L11,41 Z"
        fill="url(#bodyGrad)"
        stroke="white" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- 出水口左側 -->
  <circle cx="8" cy="29" r="3.5"
          fill="#c0392b" stroke="white" stroke-width="1.5"/>
  <circle cx="8" cy="29" r="1.8" fill="#922b21"/>

  <!-- 出水口右側 -->
  <circle cx="32" cy="29" r="3.5"
          fill="#c0392b" stroke="white" stroke-width="1.5"/>
  <circle cx="32" cy="29" r="1.8" fill="#922b21"/>

  <!-- ===== 頸部 ===== -->
  <rect x="14" y="10" width="12" height="7" rx="1"
        fill="#c0392b"
        stroke="white" stroke-width="1.5"/>

  <!-- ===== 頂蓋（橢圓形） ===== -->
  <ellipse cx="20" cy="10" rx="11" ry="5"
           fill="url(#capGrad)"
           stroke="white" stroke-width="1.5"/>
  <!-- 頂蓋頂部的螺栓圓 -->
  <circle cx="20" cy="7" r="3"
          fill="#e74c3c" stroke="white" stroke-width="1"/>

  <!-- ===== 高光（桶身左側） ===== -->
  <rect x="13" y="19" width="4" height="18" rx="2"
        fill="rgba(255,255,255,0.18)"/>
  <!-- 頂蓋高光 -->
  <ellipse cx="17" cy="9" rx="4" ry="2"
           fill="rgba(255,255,255,0.25)"/>
</svg>
