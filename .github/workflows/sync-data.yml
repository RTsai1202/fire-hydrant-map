name: 同步消防栓資料

on:
  schedule:
    - cron: '0 2 * * *'   # 每天台灣時間早上 10:00 同步
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下載並轉換 KML
        run: python3 scripts/sync_data.py

      - name: 有變更才 commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hydrants.geojson
          git diff --staged --quiet && echo "資料無更新，跳過 commit" || \
            git commit -m "chore: sync hydrant data $(date -u +%Y-%m-%d)" && git push
