<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>消防栓位置地圖 — 車籠埔分隊</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="css/autocomplete.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
      height: 100dvh;
      overflow: hidden;
      background: #1a1a2e;
    }

    /* ── 地圖全螢幕 ──────────────────────────────── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── 搜尋卡片（左上角浮動） ─────────────────── */
    #search-card {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 500;
      width: 360px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      overflow: visible;
    }

    #search-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px 6px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    #search-card-header .card-icon {
      font-size: 16px;
      line-height: 1;
    }

    #search-card-header .card-label {
      font-size: 12px;
      color: #666;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    #search-card-body {
      padding: 8px 10px 10px;
    }

    #search-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #search-input {
      flex: 1;
      padding: 9px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      background: #f9f9f9;
      color: #222;
      transition: border-color 0.2s, background 0.2s;
    }

    #search-input:focus {
      border-color: #e74c3c;
      background: #fff;
    }

    #search-input::placeholder { color: #bbb; }

    #search-btn {
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #search-btn:hover { background: #c0392b; }

    #btn-clear-search {
      background: none;
      border: none;
      color: #999;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn-clear-search:hover { color: #e74c3c; }

    #autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      z-index: 600;
      overflow: hidden;
    }

    /* ── 載入遮罩 ────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      gap: 16px;
      backdrop-filter: blur(4px);
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #e74c3c;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-msg {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.5px;
    }

    /* ── 狀態提示 ────────────────────────────────── */
    #status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 20, 0.82);
      color: #fff;
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 13px;
      pointer-events: none;
      z-index: 900;
      white-space: nowrap;
      display: none;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* ── 附近消防栓面板（底部抽屜） ─────────────── */
    #nearby-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.18);
      z-index: 700;
      max-height: 55dvh;
      overflow: hidden;
      flex-direction: column;
      backdrop-filter: blur(12px);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #nearby-panel.open {
      transform: translateY(0);
    }

    #nearby-drag {
      width: 100%;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: grab;
      touch-action: none;
    }

    #nearby-drag::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .nearby-type-icon {
      width: 18px;
      height: 18px;
      vertical-align: middle;
      margin-right: 5px;
      flex-shrink: 0;
    }

    .nearby-type-label {
      font-size: 11px;
      color: #777;
      background: rgba(0,0,0,0.06);
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 6px;
    }

    #nearby-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #nearby-title {
      font-size: 13px;
      font-weight: 700;
      color: #c0392b;
      letter-spacing: 0.3px;
    }

    .panel-close {
      background: rgba(0, 0, 0, 0.06);
      border: none;
      color: #777;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s, color 0.15s;
    }

    .panel-close:hover {
      background: rgba(231, 76, 60, 0.12);
      color: #c0392b;
    }

    #nearby-list {
      overflow-y: auto;
      flex: 1;
    }

    #nearby-list::-webkit-scrollbar { width: 4px; }
    #nearby-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .nearby-item {
      padding: 10px 14px 10px 18px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .nearby-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 0 2px 2px 0;
      background: #f39c12;
    }

    .nearby-item.dist-near::before { background: #27ae60; }
    .nearby-item.dist-mid::before  { background: #f39c12; }
    .nearby-item.dist-far::before  { background: #e67e22; }

    .nearby-item:hover { background: rgba(231, 76, 60, 0.04); }

    .nearby-name {
      font-size: 13px;
      font-weight: 600;
      color: #222;
    }

    .nearby-meta {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    .nearby-nav {
      display: inline-block;
      margin-top: 5px;
      font-size: 13px;
      color: #4285f4;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }

    .nearby-nav:hover { text-decoration: underline; }

    /* ── 消防栓詳細資訊（底部抽屜） ─────────────── */
    #info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(16px);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.22);
      z-index: 800;
      max-height: 65dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 0 0 calc(28px + env(safe-area-inset-bottom));
    }

    #info-panel.open { transform: translateY(0); }

    #info-panel::-webkit-scrollbar { width: 4px; }
    #info-panel::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

    #info-drag {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto;
      flex-shrink: 0;
      padding: 14px 0;
      background-clip: content-box;
      cursor: grab;
      touch-action: none;
    }

    #info-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 16px 8px;
      margin-bottom: 2px;
    }

    #info-title {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      border-left: 4px solid #e74c3c;
      padding-left: 10px;
    }

    #info-body {
      padding: 0 16px;
    }

    #info-body .row {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      font-size: 13px;
    }

    #info-body .row:last-child { border-bottom: none; }

    #info-body .lbl {
      color: #aaa;
      width: 90px;
      flex-shrink: 0;
      font-size: 12px;
    }

    #info-body .val {
      color: #333;
      font-weight: 500;
    }

    #info-nav {
      display: flex;
      gap: 10px;
      padding: 10px 16px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .nav-btn {
      flex: 1;
      padding: 11px 10px;
      border-radius: 24px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .nav-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .nav-btn:active { transform: translateY(0); }

    .nav-btn-google {
      background: #4285f4;
      color: #fff;
    }

    .nav-btn-apple {
      background: #f0f0f0;
      color: #333;
    }

    /* ── 右下控制按鈕 ────────────────────────────── */
    #controls {
      position: fixed;
      right: 14px;
      bottom: calc(110px + env(safe-area-inset-bottom));
      transition: bottom 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 700;
    }

    .ctrl-btn {
      background: rgba(10, 10, 20, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      font-size: 18px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
    }

    .ctrl-btn:hover {
      background: rgba(30, 30, 50, 0.82);
      transform: scale(1.06);
    }

    .ctrl-btn.active {
      background: #e74c3c;
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* ── MarkerCluster 消防栓主題 ───────────────── */
    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div {
      background-color: rgba(210, 40, 40, 0.85);
      color: #fff;
      font-weight: 700;
      font-size: 12px;
    }
    .marker-cluster-small {
      background-color: rgba(240, 100, 100, 0.5);
    }
    .marker-cluster-medium {
      background-color: rgba(210, 40, 40, 0.5);
    }
    .marker-cluster-large {
      background-color: rgba(160, 20, 20, 0.5);
    }

    /* ── 圖例（左下角水平膠囊） ─────────────────── */
    #legend {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 12px;
      background: rgba(10, 10, 20, 0.68);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 8px 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      z-index: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      flex-shrink: 0;
    }

    /* ── 同步時間角標 ────────────────────────────── */
    #sync-info {
      position: fixed;
      bottom: 6px;
      right: 10px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      z-index: 700;
      pointer-events: none;
    }

    /* ── 搜尋火焰標記 ────────────────────────────── */
    .search-fire-marker {
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    /* ── 使用者即時定位藍點 ──────────────────────── */
    @keyframes user-dot-pulse {
      0%   { transform: scale(1);   opacity: 0.5; }
      70%  { transform: scale(2.5); opacity: 0; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    .user-dot-pulse {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(66, 133, 244, 0.35);
      animation: user-dot-pulse 2s ease-out infinite;
    }

    /* ── 響應式（手機） ──────────────────────────── */
    @media (max-width: 768px) {
      #search-card {
        width: calc(100vw - 24px);
      }

      #controls {
        right: 12px;
        bottom: calc(90px + env(safe-area-inset-bottom));
      }

      #controls.panel-open {
        bottom: calc(55dvh + 20px + env(safe-area-inset-bottom));
      }

      #legend {
        gap: 10px;
        padding: 7px 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

<!-- 載入遮罩 -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">載入消防栓資料中…</div>
</div>

<!-- 地圖 -->
<div id="map"></div>

<!-- 搜尋卡片（左上角浮動） -->
<div id="search-card">
  <div id="search-card-header">
    <span class="card-icon">🚒</span>
    <span class="card-label">車籠埔分隊 消防栓地圖</span>
  </div>
  <div id="search-card-body">
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="輸入地址，查詢附近消防栓…" autocomplete="off" />
      <button id="btn-clear-search" onclick="clearSearch()" title="清除搜尋" style="display:none">✕</button>
      <button id="search-btn" onclick="doSearch()" title="搜尋">🔍</button>
    </div>
    <div id="autocomplete-list"></div>
  </div>
</div>

<!-- 狀態提示 -->
<div id="status"></div>

<!-- 附近消防栓清單（右上角浮動） -->
<div id="nearby-panel">
  <div id="nearby-drag"></div>
  <div id="nearby-header" onclick="closeNearby()" style="cursor:pointer" title="點擊收合">
    <h3 id="nearby-title">附近消防栓</h3>
    <button class="panel-close" onclick="event.stopPropagation();closeNearby()">✕</button>
  </div>
  <div id="nearby-list"></div>
</div>

<!-- 消防栓詳細資訊（底部抽屜） -->
<div id="info-panel">
  <div id="info-drag"></div>
  <div id="info-top">
    <div id="info-title"></div>
    <button class="panel-close" onclick="closeInfo()">✕</button>
  </div>
  <div id="info-nav">
    <a id="info-nav-google" class="nav-btn nav-btn-google" href="#" target="_blank">🗺 Google Maps 導航</a>
    <a id="info-nav-apple"  class="nav-btn nav-btn-apple"  href="#" target="_blank">🍎 Apple Maps 導航</a>
  </div>
  <div id="info-body"></div>
</div>

<!-- 右下控制 -->
<div id="controls">
  <button class="ctrl-btn" id="btn-locate" onclick="locateMe()" title="我的位置">📍</button>
  <button class="ctrl-btn" id="btn-all"    onclick="toggleAll()"  title="顯示/隱藏全部">👁</button>
</div>

<!-- 圖例（左下角水平膠囊） -->
<div id="legend">
  <div class="leg"><img src="img/hydrant-above.svg" style="width:16px;height:22px;object-fit:contain">地上式</div>
  <div class="leg"><img src="img/hydrant-below.svg" style="width:16px;height:16px;object-fit:contain">地下式</div>
  <div class="leg"><img src="img/hydrant-above-highlight.svg" style="width:16px;height:22px;object-fit:contain">最近幾支</div>
  <div class="leg"><span style="font-size:16px">🔥</span>搜尋位置</div>
</div>

<div id="sync-info"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="js/autocomplete.js"></script>
<script>
// ═══════════════════════════════════════════════
//  設定
// ═══════════════════════════════════════════════
const DATA_URL    = 'data/hydrants.geojson';
const MAP_CENTER  = [24.086634809984165, 120.69584520999999];
const MAP_ZOOM    = 14;
// Google Places API (New) Key
// 空字串 = 不啟用，自動使用免費的 Photon/Nominatim 方案
// 設定方式：Google Cloud Console → Places API (New) → 建立 API Key
//   ① 限制 HTTP Referrer: https://rtsai1202.github.io/*
//   ② 限制 API: 只勾 Places API (New)
//   ③ 設定每日 Quota: 1000 次（Quotas & System Limits）
const GOOGLE_PLACES_API_KEY = 'AIzaSyCgrM36BTQ7Xll-vRHdw6H_ZUTzmzf2rHg';

let nearbyCount = 5;

// ═══════════════════════════════════════════════
//  地圖初始化
// ═══════════════════════════════════════════════
const map = L.map('map', {
  center: MAP_CENTER, zoom: MAP_ZOOM,
  zoomControl: false,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20,
}).addTo(map);

// ── 圖標 ────────────────────────────────────────
function makeLeafletIcon(url, w, h, anchorX, anchorY) {
  return L.icon({
    iconUrl: url,
    iconSize: [w, h],
    iconAnchor: [anchorX, anchorY],
    popupAnchor: [0, -anchorY],
  });
}

const ICON_ABOVE          = makeLeafletIcon('img/hydrant-above.svg',           24, 34, 12, 34);
const ICON_BELOW          = makeLeafletIcon('img/hydrant-below.svg',           22, 22, 11, 11);
const ICON_ABOVE_HIGHLIGHT = makeLeafletIcon('img/hydrant-above-highlight.svg', 28, 38, 14, 38);
const ICON_BELOW_HIGHLIGHT = makeLeafletIcon('img/hydrant-below-highlight.svg', 26, 26, 13, 13);

function getHydrantType(feature) {
  const name = String(feature.properties?.name || '');
  const desc = String(feature.properties?.description || '');
  const kind = String(feature.properties?.['消防栓種類'] || feature.properties?.['種類'] || '');
  const combined = (name + desc + kind).toLowerCase();
  if (combined.includes('地下')) return 'below';
  return 'above';
}

function typeToIcon(type, highlight = false) {
  if (type === 'below') return highlight ? ICON_BELOW_HIGHLIGHT : ICON_BELOW;
  return highlight ? ICON_ABOVE_HIGHLIGHT : ICON_ABOVE;
}

// ═══════════════════════════════════════════════
//  資料載入
// ═══════════════════════════════════════════════
let allPoints   = [];  // [{ feature, latlng, marker }]
let nearbyItems = [];
let searchMarker = null;
// ── 即時定位圖層（與 searchMarker 獨立） ─────────
let userDot      = null;   // 藍色實心圓點
let userPulse    = null;   // 呼吸光圈（L.divIcon）
let userAccuracy = null;   // GPS 精度半徑圈
let watchId      = null;   // navigator.geolocation.watchPosition ID
let userLatLng   = null;   // 最新使用者座標
let layerGroup  = L.markerClusterGroup({
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  disableClusteringAtZoom: 18,
  chunkedLoading: true,
}).addTo(map);
let layerVisible = true;

fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    document.getElementById('loading').style.display = 'none';

    if (!data.features || data.features.length === 0) {
      showStatus('⚠️ 資料尚未同步，請在 GitHub 手動執行 Action', 0);
      return;
    }

    // 同步時間
    if (data._synced) {
      document.getElementById('sync-info').textContent = `資料同步：${data._synced}`;
    }

    data.features.forEach(feature => {
      if (feature.geometry?.type !== 'Point') return;
      const [lng, lat] = feature.geometry.coordinates;
      const latlng = L.latLng(lat, lng);
      const type = getHydrantType(feature);

      const marker = L.marker(latlng, { icon: typeToIcon(type) });

      marker.on('click', e => {
        L.DomEvent.stopPropagation(e);
        showInfo(feature, latlng);
      });

      marker.addTo(layerGroup);
      allPoints.push({ feature, latlng, marker, type });
    });

    showStatus(`已載入 ${allPoints.length} 支消防栓`, 3000);
  })
  .catch(() => {
    document.getElementById('loading-msg').textContent = '❌ 資料載入失敗，請確認 data/hydrants.geojson 存在';
  });

// ═══════════════════════════════════════════════
//  消防栓資訊面板
// ═══════════════════════════════════════════════
const SKIP_KEYS = new Set(['name', 'Name', 'description', 'styleUrl',
  'styleHash', 'styleMapHash', 'stroke', 'fill', 'fill-opacity', 'stroke-width']);

function showInfo(feature, latlng) {
  const p = feature.properties || {};
  const title = p.name || p['消防栓編號'] || '消防栓';
  const lat = latlng.lat, lng = latlng.lng;

  document.getElementById('info-title').textContent = `🔴 ${title}`;

  let html = '';
  Object.entries(p).forEach(([k, v]) => {
    if (SKIP_KEYS.has(k) || !v || !String(v).trim()) return;
    html += `<div class="row"><span class="lbl">${k}</span><span class="val">${v}</span></div>`;
  });
  html += `<div class="row"><span class="lbl">座標</span><span class="val">${lat.toFixed(6)}, ${lng.toFixed(6)}</span></div>`;
  document.getElementById('info-body').innerHTML = html;

  const dest = `${lat},${lng}`;
  document.getElementById('info-nav-google').href =
    `https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=driving`;
  document.getElementById('info-nav-apple').href =
    `https://maps.apple.com/?daddr=${dest}&dirflg=d`;

  document.getElementById('info-panel').classList.add('open');
  document.getElementById('controls').classList.add('panel-open');
  // info-panel 開啟時收起 nearby-panel 避免重疊
  document.getElementById('nearby-panel').style.transform = 'translateY(100%)';
  document.getElementById('nearby-panel').classList.remove('open');
  map.panTo(latlng);
}

function closeInfo() {
  const panel = document.getElementById('info-panel');
  panel.style.transform = '';
  panel.classList.remove('open');
  document.getElementById('controls').classList.remove('panel-open');
}

map.on('click', closeInfo);

// ── 面板拖曳關閉（向下滑超過 80px 則關閉） ──────
function initPanelDrag(panelEl, dragEl, closeFn) {
  let startY = 0, currentY = 0, dragging = false;
  dragEl.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    currentY = 0;
    dragging = true;
    panelEl.style.transition = 'none';
  }, { passive: true });
  dragEl.addEventListener('touchmove', e => {
    if (!dragging) return;
    currentY = e.touches[0].clientY - startY;
    if (currentY > 0) panelEl.style.transform = `translateY(${currentY}px)`;
  }, { passive: true });
  dragEl.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    panelEl.style.transition = '';
    if (currentY > 80) {
      closeFn();
    } else {
      panelEl.style.transform = '';
    }
  });
}

initPanelDrag(
  document.getElementById('info-panel'),
  document.getElementById('info-drag'),
  closeInfo
);
initPanelDrag(
  document.getElementById('nearby-panel'),
  document.getElementById('nearby-drag'),
  closeNearby
);

// ═══════════════════════════════════════════════
//  地址搜尋
// ═══════════════════════════════════════════════
document.getElementById('search-input')
  .addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      // autocomplete 下拉展開中由 autocomplete.js 處理，避免雙重觸發
      const acList = document.getElementById('autocomplete-list');
      if (acList && acList.style.display === 'block') return;
      doSearch();
    }
  });

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  showStatus('搜尋中…', 0);
  closeInfo();

  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=tw&limit=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'zh-TW' } });
    const data = await res.json();

    if (!data.length) { showStatus('找不到該地址', 3000); return; }

    const lat = parseFloat(data[0].lat);
    const lng = parseFloat(data[0].lon);
    const label = data[0].display_name.split(',').slice(0, 3).join('');

    // 舊搜尋標記清除
    if (searchMarker) map.removeLayer(searchMarker);
    clearNearbyHighlights();

    const fireIcon = L.divIcon({
      className: 'search-fire-marker',
      html: '🔥',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
    });
    searchMarker = L.marker([lat, lng], { icon: fireIcon }).addTo(map);
    searchMarker.on('click', () => showNearby(lat, lng));
    document.getElementById('btn-clear-search').style.display = 'flex';

    map.setView([lat, lng], 17);
    showNearby(lat, lng);
    map.panBy([0, Math.round(window.innerHeight * 0.27)]);
    showStatus(`顯示附近 ${nearbyCount} 支消防栓`, 3000);
    // 儲存搜尋歷史
    if (autocompleteAPI) autocompleteAPI.saveHistory({ text: label, lat, lng });

  } catch {
    showStatus('搜尋失敗，請稍後再試', 3000);
  }
}

// ── Autocomplete 初始化 ─────────────────────────
const autocompleteAPI = initAutocomplete(document.getElementById('search-input'), {
  minChars: 2,
  debounceMs: 350,
  maxResults: 8,
  getLocation() {
    if (typeof userLatLng !== 'undefined' && userLatLng) {
      return { lat: userLatLng.lat, lng: userLatLng.lng };
    }
    if (typeof map !== 'undefined') {
      const c = map.getCenter();
      return { lat: c.lat, lng: c.lng };
    }
    return null;
  },
  onSelect({ address, lat, lng, precision }) {
    closeInfo();
    if (searchMarker) map.removeLayer(searchMarker);
    clearNearbyHighlights();
    const fireIcon = L.divIcon({
      className: 'search-fire-marker',
      html: '🔥',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
    });
    searchMarker = L.marker([lat, lng], { icon: fireIcon }).addTo(map);
    searchMarker.on('click', () => showNearby(lat, lng));
    document.getElementById('btn-clear-search').style.display = 'flex';
    // 根據搜尋精度決定縮放層級
    const zoomMap = { exact: 17, street: 16, district: 13, place: 16 };
    map.setView([lat, lng], zoomMap[precision] || 17);
    showNearby(lat, lng);
    map.panBy([0, Math.round(window.innerHeight * 0.27)]);
    const precisionNote = {
      street:   '（找不到門牌，已顯示街道位置）',
      district: '（找不到地址，已顯示區域位置）',
      place:    '（地圖資料中的場所）',
    }[precision] || '';
    showStatus(`顯示附近 ${nearbyCount} 支消防栓${precisionNote}`, precisionNote ? 5000 : 3000);
    // 儲存搜尋歷史
    if (autocompleteAPI) autocompleteAPI.saveHistory({ text: address, lat, lng });
  },
});

// ═══════════════════════════════════════════════
//  附近消防栓
// ═══════════════════════════════════════════════
function haversineDist(lat1, lng1, lat2, lng2) {
  const R = 6371000, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2
    + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function showNearby(lat, lng) {
  clearNearbyHighlights();

  nearbyItems = allPoints
    .map(pt => ({ ...pt, dist: haversineDist(lat, lng, pt.latlng.lat, pt.latlng.lng) }))
    .sort((a, b) => a.dist - b.dist)
    .slice(0, nearbyCount);

  nearbyItems.forEach(item => item.marker.setIcon(typeToIcon(item.type, true)));

  const listEl = document.getElementById('nearby-list');
  listEl.innerHTML = nearbyItems.map((item, i) => {
    const p  = item.feature.properties || {};
    const name = p.name || p['消防栓編號'] || '消防栓';
    const dm = item.dist < 1000
      ? `${Math.round(item.dist)} 公尺`
      : `${(item.dist/1000).toFixed(1)} 公里`;
    const lat = item.latlng.lat, lng = item.latlng.lng;
    const distClass = item.dist < 100 ? 'dist-near' : item.dist < 300 ? 'dist-mid' : 'dist-far';
    const typeLabel = item.type === 'below' ? '地下式' : '地上式';
    return `
      <div class="nearby-item ${distClass}" onclick="flyTo(${i})">
        <div class="nearby-name">
          <img src="img/hydrant-${item.type}.svg" class="nearby-type-icon" alt="${typeLabel}">
          ${i+1}. ${name}
        </div>
        <div class="nearby-meta">
          <span class="nearby-type-label">${typeLabel}</span>📏 ${dm}
        </div>
        <a class="nearby-nav"
           href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving"
           target="_blank"
           onclick="event.stopPropagation()">🗺 導航前往</a>
      </div>`;
  }).join('');

  document.getElementById('nearby-title').textContent = `附近 ${nearbyCount} 支消防栓`;
  document.getElementById('nearby-panel').classList.add('open');
}

function flyTo(idx) {
  const item = nearbyItems[idx];
  if (!item) return;
  map.setView(item.latlng, 18);
  showInfo(item.feature, item.latlng);
  map.panBy([0, Math.round(window.innerHeight * 0.15)]);
}

function clearNearbyHighlights() {
  nearbyItems.forEach(item => item.marker.setIcon(typeToIcon(item.type, false)));
  nearbyItems = [];
}

function closeNearby() {
  clearNearbyHighlights();
  const panel = document.getElementById('nearby-panel');
  panel.classList.remove('open');
  panel.style.transform = '';
}

function clearSearch() {
  if (searchMarker) { map.removeLayer(searchMarker); searchMarker = null; }
  document.getElementById('search-input').value = '';
  document.getElementById('btn-clear-search').style.display = 'none';
  closeNearby();
}

// ═══════════════════════════════════════════════
//  我的位置（即時追蹤）
// ═══════════════════════════════════════════════
function stopWatch() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}

function clearUserLocation() {
  stopWatch();
  if (userDot)      { map.removeLayer(userDot);      userDot = null; }
  if (userPulse)    { map.removeLayer(userPulse);     userPulse = null; }
  if (userAccuracy) { map.removeLayer(userAccuracy);  userAccuracy = null; }
  userLatLng = null;
}

function locateMe() {
  if (!navigator.geolocation) {
    showStatus('此瀏覽器不支援定位功能', 3000);
    return;
  }

  // 已在追蹤中：直接飛到目前位置
  if (watchId !== null && userLatLng) {
    map.flyTo(userLatLng, Math.max(map.getZoom(), 17), { duration: 0.8 });
    showStatus('已置中到目前位置', 2000);
    return;
  }

  showStatus('定位中…', 0);
  let firstFix = true;

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      userLatLng = L.latLng(lat, lng);

      // 藍色實心圓點
      if (!userDot) {
        userDot = L.circleMarker(userLatLng, {
          radius: 8,
          fillColor: '#4285f4',
          color: '#fff',
          weight: 3,
          fillOpacity: 1,
          interactive: false,
        }).addTo(map);
      } else {
        userDot.setLatLng(userLatLng);
      }

      // 呼吸光圈
      if (!userPulse) {
        const pulseIcon = L.divIcon({
          className: '',
          html: '<div class="user-dot-pulse"></div>',
          iconSize: [20, 20],
          iconAnchor: [10, 10],
        });
        userPulse = L.marker(userLatLng, { icon: pulseIcon, interactive: false, zIndexOffset: -1 }).addTo(map);
      } else {
        userPulse.setLatLng(userLatLng);
      }

      // GPS 精度半徑圈
      if (!userAccuracy) {
        userAccuracy = L.circle(userLatLng, {
          radius: accuracy,
          color: '#4285f4',
          fillColor: '#4285f4',
          fillOpacity: 0.08,
          weight: 1,
          interactive: false,
        }).addTo(map);
      } else {
        userAccuracy.setLatLng(userLatLng);
        userAccuracy.setRadius(accuracy);
      }

      // 首次定位：飛到位置並顯示附近消防栓
      if (firstFix) {
        firstFix = false;
        map.flyTo(userLatLng, 17, { duration: 1.0 });
        showNearby(lat, lng);
        showStatus(`已定位，顯示附近 ${nearbyCount} 支消防栓`, 3000);
      }
    },
    (err) => {
      const msgs = {
        1: '定位權限被拒絕，請至設定開啟位置權限',
        2: '無法取得位置訊號，請移至空曠處再試',
        3: '定位逾時，請確認 GPS 已開啟',
      };
      showStatus(msgs[err.code] || '定位失敗', 4000);
      stopWatch();
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
  );
}

// 頁面隱藏時暫停追蹤以節省電量
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopWatch();
});

// ═══════════════════════════════════════════════
//  顯示 / 隱藏全部標記
// ═══════════════════════════════════════════════
function toggleAll() {
  const btn = document.getElementById('btn-all');
  layerVisible = !layerVisible;
  if (layerVisible) {
    map.addLayer(layerGroup);
    btn.classList.remove('active');
  } else {
    map.removeLayer(layerGroup);
    btn.classList.add('active');
  }
  showStatus(layerVisible ? '顯示全部消防栓' : '已隱藏消防栓標記', 2000);
}

// ═══════════════════════════════════════════════
//  狀態提示
// ═══════════════════════════════════════════════
let statusTimer;
function showStatus(msg, duration = 2500) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(statusTimer);
  if (duration > 0) statusTimer = setTimeout(() => { el.style.display = 'none'; }, duration);
}
